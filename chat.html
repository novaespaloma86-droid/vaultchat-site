<head>
<meta charset="UTF-8"/>

.room-ttl-mini{font-size:9px;opacity:.7;font-family:monospace}
.room-delete{background:none;border:none;color:inherit;cursor:pointer;font-size:12px;opacity:.6;padding:0}
.room-delete:hover{opacity:1}
.add-room{background:none;border:1px dashed var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--muted);cursor:pointer;font-family:'Syne',sans-serif;white-space:nowrap;flex-shrink:0}

.msg-bubble.mine{background:var(--accent);align-self:flex-end;border-bottom-right-radius:4px}
.msg-bubble.other{background:var(--bg3);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
.msg-bubble.sending{opacity:0.6}
.msg-bubble.alert-msg{background:rgba(216,90,48,.15);border:1px solid var(--danger);align-self:center;text-align:center;font-size:12px;color:var(--danger);max-width:90%}
.msg-bubble.system-msg{background:rgba(29,158,117,.1);border:1px solid rgba(29,158,117,.3);align-self:center;text-align:center;font-size:12px;color:var(--accent);max-width:90%}
.msg-img{max-width:100%;border-radius:8px;display:block;margin-top:6px;cursor:pointer;max-height:200px;object-fit:cover}
.msg-img.loading{filter:blur(4px);transition:all .3s}

.msg-sender{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:3px}

.member-avatar{width:28px;height:28px;border-radius:50%;background:rgba(29,158,117,.2);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.screenshot-overlay{position:fixed;inset:0;background:var(--bg);z-index:99999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}

.security-alert{position:fixed;inset:0;background:rgba(216,90,48,.95);z-index:99998;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:32px;text-align:center}

.img-preview{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:99997;display:none;align-items:center;justify-content:center}

.img-preview img{max-width:95%;max-height:90vh;border-radius:8px;object-fit:contain}
.img-preview-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer}
@media(min-width:768px){
  .room-name{max-width:300px}
  .msg-bubble{max-width:60%}
  .messages{padding:16px 15%}
  .input-area{padding:12px 15%}
}
</style>
</head>
<body>

<!-- MODAL CONVITE -->
<div class="modal" id="inviteModal">
  <div class="modal-card">
    <div class="modal-title">👥 Convidar para a sala</div>

      </div>
    </div>

<script>
const SUPABASE_URL='https://exkspbpamuqzzrbpbflx.supabase.co';
const SUPABASE_KEY='sb_publishable_AqEz3N2R5apg8tGG0rDu5w_2L92h4ya';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const user=JSON.parse(localStorage.getItem('vc_user')||'{"name":"Usuário","email":""}');
let currentRoom=null,currentRoomData=null,realtimeSub=null,localMessages=[],screenshotCooldown=false;

if(!localStorage.getItem('vc_token'))window.location.href='login.html';

// Verifica se entrou por convite
const urlParams=new URLSearchParams(window.location.search);
const inviteToken=urlParams.get('invite');
if(inviteToken)processarConvite(inviteToken);

// ═══ CONVITES ═══
async function processarConvite(token){
  const{data:invite}=await sb.from('invites').select('*').eq('token',token).single();
  if(!invite){mostrarToast('Link inválido ou expirado','',true);return;}
  if(invite.expires_at&&new Date(invite.expires_at)<new Date()){mostrarToast('Convite expirado','',true);return;}
  if(invite.used_count>=invite.max_uses){mostrarToast('Convite atingiu limite de usos','',true);return;}

  // Registra membro
  await sb.from('room_members').upsert({
    id:invite.room_id+'_'+user.email,
    room_id:invite.room_id,
    user_email:user.email||user.name,
    user_name:user.name,
    invited_by:invite.created_by
  });

  // Incrementa uso
  await sb.from('invites').update({used_count:invite.used_count+1}).eq('token',token);

  // Envia mensagem de boas-vindas
  await sb.from('messages').insert({
    id:'join_'+Date.now(),
    room_id:invite.room_id,
    sender:'__SISTEMA__',
    text:'👋 '+user.name+' entrou na sala.',
    sent_at:new Date().toISOString(),
    expires_at:new Date(Date.now()+86400000).toISOString()
  });

  // Remove token da URL
  window.history.replaceState({},'',window.location.pathname);
  mostrarToast('Bem-vindo à sala!','Você foi adicionado com sucesso.');

  // Seleciona a sala
  await loadRooms();
  const{data:room}=await sb.from('rooms').select('*').eq('id',invite.room_id).single();
  if(room)selectRoom(room);
}

async function showInvite(){
  if(!currentRoom)return;
  document.getElementById('inviteModal').style.display='flex';

  // Gera ou busca token existente
  let{data:invite}=await sb.from('invites').select('*').eq('room_id',currentRoom).order('created_at',{ascending:false}).limit(1).single();

  if(!invite||new Date(invite.expires_at)<new Date()){
    const token=Math.random().toString(36).substr(2,12)+Date.now().toString(36);
    const{data:newInvite}=await sb.from('invites').insert({
      id:'inv_'+Date.now(),
      room_id:currentRoom,
      token,
      created_by:user.name,
      expires_at:new Date(Date.now()+7*24*3600000).toISOString(),
      max_uses:50
    }).select().single();
    invite=newInvite;
  }

  if(invite){
    const link=window.location.origin+window.location.pathname+'?invite='+invite.token;
    document.getElementById('inviteLink').textContent=link;
    document.getElementById('inviteLink').dataset.link=link;
  }

  // Carrega membros
  const{data:members}=await sb.from('room_members').select('*').eq('room_id',currentRoom);
  const list=document.getElementById('membersList');
  list.innerHTML='';
  if(members&&members.length>0){
    members.forEach(m=>{
      const div=document.createElement('div');
      div.className='member-item';
      div.innerHTML='<div class="member-avatar">'+m.user_name.charAt(0).toUpperCase()+'</div><div><div style="font-size:13px">'+m.user_name+'</div><div style="font-size:10px;color:var(--muted)">'+m.user_email+'</div></div>';
      list.appendChild(div);
    });
  } else {
    list.innerHTML='<div style="font-size:13px;color:var(--muted)">Nenhum membro ainda. Compartilhe o link!</div>';
  }
}

function copiarLink(){
  const link=document.getElementById('inviteLink').dataset.link||document.getElementById('inviteLink').textContent;
  navigator.clipboard.writeText(link).then(()=>{
    mostrarToast('Link copiado!','Cole no WhatsApp ou e-mail');
  }).catch(()=>{
    // Fallback para iOS
    const el=document.createElement('textarea');
    el.value=link;document.body.appendChild(el);el.select();
    document.execCommand('copy');document.body.removeChild(el);
    mostrarToast('Link copiado!','');
  });
}

// ═══ SCREENSHOT ═══
function ocultarMensagens(){document.getElementById('messages').style.filter='blur(20px)';document.getElementById('screenshotOverlay').classList.add('show');}
function revelarMensagens(){document.getElementById('messages').style.filter='';document.getElementById('screenshotOverlay').classList.remove('show');}
async function detectarScreenshot(){
  if(screenshotCooldown||!currentRoom)return;
  screenshotCooldown=true;ocultarMensagens();
  try{await sb.from('messages').insert({id:'alert_'+Date.now(),room_id:currentRoom,sender:'__SISTEMA__',text:'🚨 ALERTA: '+user.name+' tentou capturar a tela.',sent_at:new Date().toISOString(),expires_at:new Date(Date.now()+86400000).toISOString()});}catch(e){}
  setTimeout(()=>{revelarMensagens();screenshotCooldown=false;},3000);
}
document.addEventListener('keyup',e=>{if(e.key==='PrintScreen')detectarScreenshot();});
let lastVisible=Date.now();
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){lastVisible=Date.now();ocultarMensagens();}

// ═══ COMPRESSÃO ═══
function comprimirImagem(file,maxWidth=1200,qualidade=0.75){
  return new Promise((resolve)=>{
    if(!file.type.startsWith('image/')){resolve(file);return;}
    const reader=new FileReader();
    reader.onload=(e)=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        let w=img.width,h=img.height;
        if(w>maxWidth){h=Math.round(h*maxWidth/w);w=maxWidth;}
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        canvas.toBlob((blob)=>resolve(new File([blob],file.name,{type:'image/jpeg'})),'image/jpeg',qualidade);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ═══ UPLOAD ═══
async function uploadArquivo(input){
  const file=input.files[0];if(!file||!currentRoom)return;
  if(file.size>20*1024*1024){alert('Máximo 20MB.');return;}
  const isImage=file.type.startsWith('image/');
  const progress=document.getElementById('uploadProgress');
  const fill=document.getElementById('progressFill');
  const label=document.getElementById('uploadLabel');
  progress.classList.add('show');
  if(isImage){
    const localUrl=URL.createObjectURL(file);
    const tempId='temp_img_'+Date.now();
    const ttl=parseInt(document.getElementById('ttlSelect').value);
    const tempMsg={id:tempId,sender:user.name,text:'',file_url:localUrl,file_name:file.name,is_image:true,sent_at:new Date().toISOString(),expires_at:ttl>0?new Date(Date.now()+ttl).toISOString():null,_sending:true};
    localMessages.push(tempMsg);renderMessages(localMessages);
    label.textContent='📎 Comprimindo...';fill.style.width='20%';
    const compressed=await comprimirImagem(file);
    label.textContent='📎 Enviando...';fill.style.width='50%';
    const path=currentRoom+'/'+Date.now()+'.jpg';
    const{error}=await sb.storage.from('vaultchat-files').upload(path,compressed);
    fill.style.width='80%';
    if(error){localMessages=localMessages.filter(m=>m.id!==tempId);renderMessages(localMessages);progress.classList.remove('show');alert('Erro ao enviar.');input.value='';return;}
    const{data:urlData}=sb.storage.from('vaultchat-files').getPublicUrl(path);
    fill.style.width='100%';
    const{data:msgData}=await sb.from('messages').insert({id:Date.now().toString(),room_id:currentRoom,sender:user.name,text:'[IMAGEM]',file_url:urlData.publicUrl,file_name:file.name,file_type:'image/jpeg',is_image:true,sent_at:tempMsg.sent_at,expires_at:tempMsg.expires_at}).select().single();
    const idx=localMessages.findIndex(m=>m.id===tempId);
    if(idx!==-1&&msgData){URL.revokeObjectURL(localUrl);localMessages[idx]={...msgData};renderMessages(localMessages);}
  } else {
    label.textContent='📎 Enviando arquivo...';fill.style.width='40%';
    const ext=file.name.split('.').pop();
    const path=currentRoom+'/'+Date.now()+'.'+ext;
    const{error}=await sb.storage.from('vaultchat-files').upload(path,file);
    fill.style.width='80%';
    if(error){progress.classList.remove('show');alert('Erro ao enviar.');input.value='';return;}
    const{data:urlData}=sb.storage.from('vaultchat-files').getPublicUrl(path);
    const ttl=parseInt(document.getElementById('ttlSelect').value);
    fill.style.width='100%';
    await sb.from('messages').insert({id:Date.now().toString(),room_id:currentRoom,sender:user.name,text:'[ARQUIVO]',file_url:urlData.publicUrl,file_name:file.name,file_type:file.type,is_image:false,sent_at:new Date().toISOString(),expires_at:ttl>0?new Date(Date.now()+ttl).toISOString():null});
  }
  setTimeout(()=>{progress.classList.remove('show');fill.style.width='0%';},500);
  input.value='';
}

function abrirPreview(url){document.getElementById('imgPreviewSrc').src=url;document.getElementById('imgPreview').classList.add('show');}
function fecharPreview(){document.getElementById('imgPreview').classList.remove('show');}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,80)+'px';}

// ═══ SALAS ═══
async function loadRooms(){
  const now=new Date().toISOString();
  await sb.from('rooms').delete().lt('expires_at',now).not('expires_at','is',null);
  const{data}=await sb.from('rooms').select('*').order('created_at');
  const bar=document.getElementById('roomsBar');
  bar.innerHTML='<button class="add-room" onclick="showNewRoom()">+ Nova sala</button>';
  if(data)data.forEach(r=>{
    const chip=document.createElement('div');
    const expiring=r.expires_at&&new Date(r.expires_at)-new Date()<3600000;
    chip.className='room-chip'+(currentRoom===r.id?' active':'')+(expiring?' expiring':'');
    const nameSpan=document.createElement('span');nameSpan.textContent=r.name;chip.appendChild(nameSpan);
    if(r.expires_at){const ttlSpan=document.createElement('span');ttlSpan.className='room-ttl-mini';ttlSpan.textContent='⏱'+timeLeft(r.expires_at);chip.appendChild(ttlSpan);}
    const delBtn=document.createElement('button');delBtn.className='room-delete';delBtn.textContent='✕';
    delBtn.onclick=(e)=>{e.stopPropagation();deleteRoom(r.id,r.name);};
    chip.appendChild(delBtn);
    chip.onclick=(e)=>{if(e.target!==delBtn)selectRoom(r);};
    bar.appendChild(chip);
  });
}

async function deleteRoom(roomId,roomName){
  if(!confirm('Apagar a sala "'+roomName+'"?'))return;
  await sb.from('messages').delete().eq('room_id',roomId);
  await sb.from('rooms').delete().eq('id',roomId);
  if(currentRoom===roomId){
    currentRoom=null;currentRoomData=null;
    document.getElementById('currentRoomName').textContent='VaultChat';
    document.getElementById('currentRoomTTL').innerHTML='<span class="online-dot"></span>Selecione uma sala';
    document.getElementById('inputArea').style.display='none';
    document.getElementById('inviteBtn').style.display='none';
    document.getElementById('emptyState').style.display='flex';
    localMessages=[];renderMessages([]);
  }
  loadRooms();
}

async function selectRoom(room){
  if(room.expires_at&&new Date(room.expires_at)<new Date()){await deleteRoom(room.id,room.name);return;}
  currentRoom=room.id;currentRoomData=room;localMessages=[];
  document.getElementById('currentRoomName').textContent=room.name;
  let ttlInfo=ttlLabel(room.ttl)+' · E2E';
  if(room.expires_at)ttlInfo+=' · Sala: '+timeLeft(room.expires_at);
  document.getElementById('currentRoomTTL').innerHTML='<span class="online-dot"></span>'+ttlInfo;
  document.getElementById('inputArea').style.display='flex';
  document.getElementById('inviteBtn').style.display='flex';
  document.getElementById('ttlSelect').value=room.ttl||86400000;
  document.getElementById('emptyState').style.display='none';

  // Registra usuário como membro
  await sb.from('room_members').upsert({
    id:room.id+'_'+(user.email||user.name),
    room_id:room.id,user_email:user.email||user.name,user_name:user.name,invited_by:user.name
  });

  loadRooms();await loadMessages();subscribeRoom();
}

async function loadMessages(){
  if(!currentRoom)return;
  const now=new Date().toISOString();
  await sb.from('messages').delete().eq('room_id',currentRoom).lt('expires_at',now).not('expires_at','is',null);
  const{data}=await sb.from('messages').select('*').eq('room_id',currentRoom).order('sent_at');
  localMessages=data||[];renderMessages(localMessages);
}

async function sendMessage(){
  if(!currentRoom)return;
  const input=document.getElementById('msgInput');
  const text=input.value.trim();if(!text)return;
  const ttl=parseInt(document.getElementById('ttlSelect').value);
  const expires_at=ttl>0?new Date(Date.now()+ttl).toISOString():null;
  const tempId='temp_'+Date.now();
  const tempMsg={id:tempId,room_id:currentRoom,sender:user.name,text,sent_at:new Date().toISOString(),expires_at,_sending:true};
  localMessages.push(tempMsg);renderMessages(localMessages);
  input.value='';input.style.height='auto';
  const{data}=await sb.from('messages').insert({id:Date.now().toString(),room_id:currentRoom,sender:user.name,text,sent_at:tempMsg.sent_at,expires_at}).select().single();
  const idx=localMessages.findIndex(m=>m.id===tempId);
  if(idx!==-1){data?localMessages[idx]={...data}:localMessages.splice(idx,1);renderMessages(localMessages);}
}

function renderMessages(msgs){
  const c=document.getElementById('messages');
  const atBottom=c.scrollHeight-c.scrollTop-c.clientHeight<50;
  c.innerHTML='';
  const enc=document.createElement('div');enc.className='enc-badge';
  enc.innerHTML='<div class="enc-dot"></div> E2E · Mensagens e salas expiram automaticamente';
  c.appendChild(enc);
  msgs.forEach(msg=>{
    if(msg.sender==='__SISTEMA__'){
      const a=document.createElement('div');
      const isAlert=msg.text.includes('🚨');
      a.className='msg-bubble '+(isAlert?'alert-msg':'system-msg');
      a.textContent=msg.text;c.appendChild(a);return;
    }
    const isMine=msg.sender===user.name;
    const b=document.createElement('div');
    b.className='msg-bubble '+(isMine?'mine':'other')+(msg._sending?' sending':'');
    if(!isMine){const s=document.createElement('div');s.className='msg-sender';s.textContent=msg.sender;b.appendChild(s);}
    if(msg.is_image&&msg.file_url){
      const img=document.createElement('img');img.className='msg-img loading';img.src=msg.file_url;
      img.onload=()=>img.classList.replace('loading','loaded');
      img.onclick=()=>abrirPreview(msg.file_url);b.appendChild(img);
    } else if(msg.file_url&&!msg.is_image){
      const link=document.createElement('a');link.className='msg-file';link.href=msg.file_url;link.target='_blank';
      link.innerHTML='<div class="msg-file-icon">📄</div><div><div style="font-size:12px;font-weight:600">'+(msg.file_name||'Arquivo')+'</div><div style="font-size:10px;opacity:.7">Toque para abrir</div></div>';
      b.appendChild(link);
    } else if(msg.text&&!['[IMAGEM]','[ARQUIVO]'].includes(msg.text)){
      const t=document.createElement('div');t.textContent=msg.text;b.appendChild(t);
    }
    const meta=document.createElement('div');meta.className='msg-meta';
    meta.innerHTML='<span>'+new Date(msg.sent_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+(msg._sending?' · ⏳':'')+'</span>';
    if(msg.expires_at&&!msg._sending){
      const diff=new Date(msg.expires_at)-new Date();
      const badge=document.createElement('span');
      badge.className='ttl-badge'+(diff<3600000?' ttl-urgent':'');
      badge.textContent='⏱ '+timeLeft(msg.expires_at);
      meta.appendChild(badge);
    }
    b.appendChild(meta);c.appendChild(b);
  });
  if(atBottom||msgs[msgs.length-1]?.sender===user.name)c.scrollTop=c.scrollHeight;
}

function subscribeRoom(){
  if(realtimeSub)realtimeSub.unsubscribe();
  realtimeSub=sb.channel('room-'+currentRoom)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'room_id=eq.'+currentRoom},(payload)=>{
      const msg=payload.new;
      if(msg.sender==='__SISTEMA__'&&msg.text.includes('🚨')&&!msg.text.includes(user.name)){
        document.getElementById('securityAlertMsg').textContent=msg.text;
        document.getElementById('securityAlert').classList.add('show');
        ocultarMensagens();setTimeout(()=>revelarMensagens(),4000);
      }
      const exists=localMessages.some(m=>m.id===msg.id||(m._sending&&m.sender===msg.sender&&m.text===msg.text));
      if(!exists){localMessages.push(msg);renderMessages(localMessages);}
      else{const idx=localMessages.findIndex(m=>m._sending&&m.sender===msg.sender&&m.text===msg.text);if(idx!==-1){localMessages[idx]={...msg};renderMessages(localMessages);}}
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'messages',filter:'room_id=eq.'+currentRoom},(payload)=>{
      localMessages=localMessages.filter(m=>m.id!==payload.old.id);renderMessages(localMessages);
    })
    .subscribe();
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function showNewRoom(){document.getElementById('newRoomModal').style.display='flex';setTimeout(()=>document.getElementById('roomNameInput').focus(),100);}
function closeModal(id){document.getElementById(id||'newRoomModal').style.display='none';}

async function createRoom(){
  const name=document.getElementById('roomNameInput').value.trim();if(!name)return;
  const ttl=parseInt(document.getElementById('roomTTLInput').value);
  const expire=parseInt(document.getElementById('roomExpireInput').value);
  const expires_at=expire>0?new Date(Date.now()+expire).toISOString():null;
  const{data}=await sb.from('rooms').insert({id:'room_'+Date.now(),name,ttl,expires_at,created_at:new Date().toISOString()}).select().single();
  closeModal('newRoomModal');document.getElementById('roomNameInput').value='';
  await loadRooms();if(data)selectRoom(data);
}

async function clearRoom(){
  if(!currentRoom)return;
  if(confirm('Apagar todas as mensagens desta sala?')){
    await sb.from('messages').delete().eq('room_id',currentRoom);
    localMessages=[];renderMessages(localMessages);
  }
}

function ttlLabel(ms){if(!ms||ms==0)return'Nunca';if(ms<=3600000)return'1h';if(ms<=21600000)return'6h';if(ms<=86400000)return'24h';if(ms<=259200000)return'3d';return'7d';}
function timeLeft(e){
  const d=new Date(e)-new Date();if(d<=0)return'Expirada';
  const dias=Math.floor(d/86400000),h=Math.floor((d%86400000)/3600000),m=Math.floor((d%3600000)/60000);
  if(dias>0)return dias+'d '+h+'h';if(h>0)return h+'h '+m+'m';return m+'m';
}
function mostrarToast(title,body,danger=false){
  const div=document.createElement('div');div.className='notif-toast'+(danger?' danger-toast':'');
  div.innerHTML='<strong>'+(danger?'⚠️ ':'🔒 ')+(title||'VaultChat')+'</strong>'+(body?'<br>'+body:'');
  document.body.appendChild(div);setTimeout(()=>div.remove(),4000);
}
function goLogin(){localStorage.removeItem('vc_token');window.location.href='login.html';}
setInterval(()=>{if(currentRoom)loadMessages();loadRooms();},60000);
loadRooms();
</script>
