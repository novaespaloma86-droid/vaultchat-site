<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VaultChat — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0B0D;color:#F0EEE8;font-family:'Syne',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;flex-direction:column;gap:16px}
.lang-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.lang-btn{background:#0F1114;border:0.5px solid #2A2D38;border-radius:20px;padding:6px 14px;font-size:12px;color:#7A7D8A;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s}
.lang-btn.active{background:#1D9E75;border-color:#1D9E75;color:#fff;font-weight:700}
.card{background:#0F1114;border:0.5px solid #2A2D38;border-radius:18px;padding:36px;width:100%;max-width:400px}
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px}
.logo-icon{width:40px;height:40px;background:#1D9E75;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-name{font-size:22px;font-weight:800}
.tabs{display:flex;background:#161820;border-radius:10px;padding:4px;margin-bottom:24px}
.tab{flex:1;padding:9px;text-align:center;border-radius:7px;cursor:pointer;font-size:14px;color:#7A7D8A;font-weight:500;transition:all .2s}
.tab.active{background:#1A1D24;color:#F0EEE8;font-weight:700}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#7A7D8A;margin-bottom:6px;font-weight:600;text-transform:uppercase}
.field input{width:100%;background:#161820;border:0.5px solid #2A2D38;border-radius:10px;padding:13px 14px;color:#F0EEE8;font-size:15px;font-family:'Syne',sans-serif;outline:none;transition:border .2s}
.field input:focus{border-color:#1D9E75}
.btn{width:100%;padding:14px;background:#1D9E75;border:none;border-radius:12px;color:#fff;font-size:16px;font-family:'Syne',sans-serif;font-weight:800;cursor:pointer;margin-top:8px;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sec{width:100%;padding:12px;background:transparent;border:1px solid #2A2D38;border-radius:12px;color:#7A7D8A;font-size:14px;font-family:'Syne',sans-serif;cursor:pointer;margin-top:8px}
.link-btn{background:none;border:none;color:#1D9E75;font-size:13px;font-family:'Syne',sans-serif;cursor:pointer;text-decoration:underline;margin-top:12px;display:block;text-align:center;width:100%}
.msg{padding:12px;border-radius:8px;font-size:13px;margin-top:12px;text-align:center;display:none}
.msg.error{background:rgba(216,90,48,.15);border:0.5px solid #D85A30;color:#D85A30}
.msg.success{background:rgba(29,158,117,.15);border:0.5px solid #1D9E75;color:#9FE1CB}
.enc{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:20px;font-size:11px;color:#7A7D8A;font-family:monospace}
.enc-dot{width:5px;height:5px;border-radius:50%;background:#1D9E75;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* 2FA */
.code-inputs{display:flex;gap:10px;justify-content:center;margin:16px 0}
.code-inputs input{width:46px;height:56px;text-align:center;font-size:24px;font-weight:800;background:#161820;border:1px solid #2A2D38;border-radius:10px;color:#F0EEE8;font-family:'Syne',sans-serif;outline:none;transition:border .2s}
.code-inputs input:focus{border-color:#1D9E75}
.code-timer{text-align:center;font-size:12px;color:#7A7D8A;margin-bottom:8px}
.code-timer span{color:#1D9E75;font-weight:700}
.security-badge{display:flex;align-items:center;gap:8px;background:rgba(29,158,117,.08);border:1px solid rgba(29,158,117,.2);border-radius:10px;padding:10px 12px;margin-bottom:16px;font-size:12px;color:#9FE1CB}
</style>
</head>
<body>
<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('pt',this)">🇧🇷 Português</button>
  <button class="lang-btn" onclick="setLang('en',this)">🇺🇸 English</button>
  <button class="lang-btn" onclick="setLang('es',this)">🇪🇸 Español</button>
  <button class="lang-btn" onclick="setLang('fr',this)">🇫🇷 Français</button>
  <button class="lang-btn" onclick="setLang('de',this)">🇩🇪 Deutsch</button>
  <button class="lang-btn" onclick="setLang('it',this)">🇮🇹 Italiano</button>
  <button class="lang-btn" onclick="setLang('zh',this)">🇨🇳 中文</button>
  <button class="lang-btn" onclick="setLang('ja',this)">🇯🇵 日本語</button>
</div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🔒</div>
    <div class="logo-name">VaultChat</div>
  </div>

  <!-- TELA LOGIN/REGISTER -->
  <div id="authArea">
    <div class="tabs">
      <div class="tab active" id="tabLogin" onclick="switchTab('login',this)">Entrar</div>
      <div class="tab" id="tabRegister" onclick="switchTab('register',this)">Criar conta</div>
    </div>

    <div id="loginForm">
      <div class="field"><label>E-MAIL</label><input type="email" id="loginEmail" placeholder="seu@email.com"/></div>
      <div class="field"><label>SENHA</label><input type="password" id="loginPassword" placeholder="Sua senha" onkeydown="if(event.key==='Enter')login()"/></div>
      <button class="btn" onclick="login()" id="loginBtn">Entrar</button>
      <button class="link-btn" onclick="showForgot()">Esqueci minha senha</button>
    </div>

    <div id="registerForm" style="display:none">
      <div class="field"><label>NOME</label><input type="text" id="regName" placeholder="Seu nome"/></div>
      <div class="field"><label>E-MAIL</label><input type="email" id="regEmail" placeholder="seu@email.com"/></div>
      <div class="field"><label>SENHA</label><input type="password" id="regPassword" placeholder="Mínimo 6 caracteres"/></div>
      <button class="btn" onclick="register()" id="registerBtn">Criar conta</button>
    </div>

    <div id="forgotForm" style="display:none">
      <p style="font-size:14px;color:#7A7D8A;margin-bottom:16px;text-align:center">Digite seu e-mail para redefinir sua senha.</p>
      <div class="field"><label>E-MAIL</label><input type="email" id="forgotEmail" placeholder="seu@email.com"/></div>
      <div class="field" id="newPassField" style="display:none"><label>NOVA SENHA</label><input type="password" id="newPassword" placeholder="Nova senha"/></div>
      <button class="btn" onclick="forgotPassword()" id="forgotBtn">Enviar código</button>
      <button class="link-btn" onclick="showLogin()">Voltar para o login</button>
    </div>

    <div class="msg" id="msg"></div>
    <div class="enc"><div class="enc-dot"></div><span>AES-256 · Criptografia ponta a ponta</span></div>
  </div>

  <!-- TELA 2FA -->
  <div id="tfaArea" style="display:none">
    <div class="security-badge">🛡️ Verificação em duas etapas ativada</div>
    <p style="text-align:center;font-size:14px;color:#7A7D8A;margin-bottom:8px">Digite o código enviado para</p>
    <p style="text-align:center;font-size:14px;font-weight:700;color:#1D9E75;margin-bottom:20px" id="tfaEmailLabel"></p>
    <div class="code-inputs">
      <input type="number" maxlength="1" id="c1" oninput="moveNext(this,'c2')" onkeydown="movePrev(event,null,'c1')"/>
      <input type="number" maxlength="1" id="c2" oninput="moveNext(this,'c3')" onkeydown="movePrev(event,'c1','c2')"/>
      <input type="number" maxlength="1" id="c3" oninput="moveNext(this,'c4')" onkeydown="movePrev(event,'c2','c3')"/>
      <input type="number" maxlength="1" id="c4" oninput="moveNext(this,'c5')" onkeydown="movePrev(event,'c3','c4')"/>
      <input type="number" maxlength="1" id="c5" oninput="moveNext(this,'c6')" onkeydown="movePrev(event,'c4','c5')"/>
      <input type="number" maxlength="1" id="c6" oninput="moveNext(this,null)" onkeydown="movePrev(event,'c5','c6')"/>
    </div>
    <div class="code-timer">Código expira em <span id="timerDisplay">05:00</span></div>
    <button class="btn" onclick="verify2FA()" id="verifyBtn">Verificar</button>
    <button class="btn-sec" onclick="reenviarCodigo()">Reenviar código</button>
    <div class="msg" id="tfaMsg"></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://exkspbpamuqzzrbpbflx.supabase.co';
const SUPABASE_KEY='sb_publishable_AqEz3N2R5apg8tGG0rDu5w_2L92h4ya';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let lang='pt';
let _pendingUser=null;
let _timerInterval=null;

// ── Hash de senha simples (SHA-256 via SubtleCrypto) ──
async function hashPassword(password){
  const encoder=new TextEncoder();
  const data=encoder.encode(password+SUPABASE_URL); // salt
  const hashBuffer=await crypto.subtle.digest('SHA-256',data);
  const hashArray=Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── Gerar código 6 dígitos ──
function gerarCodigo(){
  return Math.floor(100000+Math.random()*900000).toString();
}

// ── Enviar código por email via Supabase Edge Function ou salvar na tabela ──
async function enviarCodigo(email, nome){
  const code=gerarCodigo();
  const expires_at=new Date(Date.now()+5*60*1000).toISOString(); // 5 min

  // Invalida códigos anteriores
  await sb.from('vc_2fa_codes').delete().eq('email',email);

  // Salva novo código
  await sb.from('vc_2fa_codes').insert({
    email,
    code,
    expires_at,
    used:false
  });

  // Tenta enviar via Resend (se configurado) ou mostra na tela para dev
  try{
    const res=await fetch('/api/send-2fa',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,code,nome:nome||'Usuário'})
    });
    if(!res.ok)throw new Error('API offline');
  }catch(e){
    // Em desenvolvimento: mostra o código na tela
    console.log('CÓDIGO 2FA (dev):', code);
    showMsg2FA('🔧 Dev mode — código: '+code,'success');
  }

  return code;
}

// ── LOGIN ──
async function login(){
  const email=document.getElementById('loginEmail').value.trim().toLowerCase();
  const password=document.getElementById('loginPassword').value;
  if(!email||!password)return showMsg('Preencha todos os campos','error');

  const btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.textContent='Verificando...';

  try{
    const hash=await hashPassword(password);
    const{data:user,error}=await sb.from('vc_users')
      .select('*').eq('email',email).eq('password_hash',hash).single();

    if(error||!user){
      // Tentar login legacy (localStorage) para migração
      const legacyUsers=JSON.parse(localStorage.getItem('vc_users')||'{}');
      const legacy=legacyUsers[email];
      if(legacy&&legacy.password===btoa(password)){
        // Migra para Supabase
        await migrarUsuario(legacy, hash);
        _pendingUser={name:legacy.name,email,id:email};
        await mostrar2FA(email, legacy.name);
      } else {
        showMsg('Email ou senha incorretos','error');
      }
      btn.disabled=false;btn.textContent='Entrar';
      return;
    }

    _pendingUser=user;
    btn.disabled=false;btn.textContent='Entrar';
    await mostrar2FA(email, user.name);

  }catch(e){
    showMsg('Erro ao conectar. Tente novamente.','error');
    btn.disabled=false;btn.textContent='Entrar';
  }
}

async function migrarUsuario(legacy, hash){
  try{
    await sb.from('vc_users').upsert({
      name:legacy.name,
      email:legacy.email,
      password_hash:hash,
      is_verified:true
    });
  }catch(e){console.log('migração:',e);}
}

// ── REGISTER ──
async function register(){
  const name=document.getElementById('regName').value.trim();
  const email=document.getElementById('regEmail').value.trim().toLowerCase();
  const password=document.getElementById('regPassword').value;

  if(!name||!email||!password)return showMsg('Preencha todos os campos','error');
  if(password.length<6)return showMsg('Senha: mínimo 6 caracteres','error');

  const btn=document.getElementById('registerBtn');
  btn.disabled=true;btn.textContent='Criando conta...';

  try{
    // Verifica se já existe
    const{data:existing}=await sb.from('vc_users').select('id').eq('email',email).single();
    if(existing){
      showMsg('Email já cadastrado','error');
      btn.disabled=false;btn.textContent='Criar conta';
      return;
    }

    const hash=await hashPassword(password);
    const{data:newUser,error}=await sb.from('vc_users').insert({
      name,email,password_hash:hash,is_verified:false
    }).select().single();

    if(error)throw error;

    _pendingUser=newUser;
    btn.disabled=false;btn.textContent='Criar conta';
    await mostrar2FA(email, name);

  }catch(e){
    showMsg('Erro ao criar conta: '+e.message,'error');
    btn.disabled=false;btn.textContent='Criar conta';
  }
}

// ── MOSTRAR TELA 2FA ──
async function mostrar2FA(email, nome){
  document.getElementById('authArea').style.display='none';
  document.getElementById('tfaArea').style.display='block';
  document.getElementById('tfaEmailLabel').textContent=email;

  await enviarCodigo(email, nome);
  iniciarTimer(5*60);

  setTimeout(()=>document.getElementById('c1').focus(),100);
}

// ── VERIFICAR CÓDIGO 2FA ──
async function verify2FA(){
  const code=['c1','c2','c3','c4','c5','c6'].map(id=>document.getElementById(id).value).join('');
  if(code.length<6)return showMsg2FA('Digite o código completo','error');

  const btn=document.getElementById('verifyBtn');
  btn.disabled=true;btn.textContent='Verificando...';

  const{data:record}=await sb.from('vc_2fa_codes')
    .select('*').eq('email',_pendingUser.email||_pendingUser.id).eq('code',code).eq('used',false).single();

  if(!record){
    showMsg2FA('Código inválido','error');
    btn.disabled=false;btn.textContent='Verificar';
    return;
  }

  if(new Date(record.expires_at)<new Date()){
    showMsg2FA('Código expirado. Reenvie.','error');
    btn.disabled=false;btn.textContent='Verificar';
    return;
  }

  // Marca como usado
  await sb.from('vc_2fa_codes').update({used:true}).eq('id',record.id);

  // Atualiza último login
  await sb.from('vc_users').update({last_login:new Date().toISOString(),is_verified:true})
    .eq('email',_pendingUser.email||_pendingUser.id);

  // Salva sessão
  clearInterval(_timerInterval);
  const sessionUser={
    name:_pendingUser.name,
    email:_pendingUser.email||_pendingUser.id,
    id:_pendingUser.id
  };
  localStorage.setItem('vc_token','logged');
  localStorage.setItem('vc_user',JSON.stringify(sessionUser));

  showMsg2FA('✅ Verificado! Entrando...','success');
  setTimeout(()=>window.location.href='chat.html',1000);
}

async function reenviarCodigo(){
  if(!_pendingUser)return;
  clearInterval(_timerInterval);
  await enviarCodigo(_pendingUser.email||_pendingUser.id, _pendingUser.name);
  iniciarTimer(5*60);
  showMsg2FA('Novo código enviado!','success');
  ['c1','c2','c3','c4','c5','c6'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('c1').focus();
}

// ── RECUPERAR SENHA ──
async function forgotPassword(){
  const email=document.getElementById('forgotEmail').value.trim().toLowerCase();
  const newPassField=document.getElementById('newPassField');
  if(!email)return showMsg('Preencha o email','error');

  if(newPassField.style.display==='none'){
    const{data:user}=await sb.from('vc_users').select('*').eq('email',email).single();
    // Também verifica localStorage legacy
    const legacy=JSON.parse(localStorage.getItem('vc_users')||'{}')[email];
    if(!user&&!legacy)return showMsg('Email não encontrado','error');

    _pendingUser=user||{name:legacy?.name,email,id:email};
    newPassField.style.display='block';
    document.getElementById('forgotBtn').textContent='Redefinir senha';
    showMsg('Email encontrado! Digite sua nova senha.','success');
  } else {
    const newPass=document.getElementById('newPassword').value;
    if(!newPass||newPass.length<6)return showMsg('Senha: mínimo 6 caracteres','error');
    const hash=await hashPassword(newPass);
    await sb.from('vc_users').update({password_hash:hash}).eq('email',email);
    // Atualiza legacy também
    const legacy=JSON.parse(localStorage.getItem('vc_users')||'{}');
    if(legacy[email]){legacy[email].password=btoa(newPass);localStorage.setItem('vc_users',JSON.stringify(legacy));}
    showMsg('Senha redefinida! Faça login.','success');
    setTimeout(()=>{showLogin();newPassField.style.display='none';},2000);
  }
}

// ── TIMER 2FA ──
function iniciarTimer(segundos){
  clearInterval(_timerInterval);
  let s=segundos;
  _timerInterval=setInterval(()=>{
    s--;
    const min=Math.floor(s/60).toString().padStart(2,'0');
    const sec=(s%60).toString().padStart(2,'0');
    const el=document.getElementById('timerDisplay');
    if(el)el.textContent=min+':'+sec;
    if(s<=0){
      clearInterval(_timerInterval);
      if(el)el.textContent='Expirado';
    }
  },1000);
}

// ── INPUTS DO CÓDIGO ──
function moveNext(el,nextId){
  el.value=el.value.slice(-1); // só 1 dígito
  if(el.value&&nextId)document.getElementById(nextId).focus();
  // Auto-verificar quando completo
  const code=['c1','c2','c3','c4','c5','c6'].map(id=>document.getElementById(id).value).join('');
  if(code.length===6)setTimeout(verify2FA,300);
}
function movePrev(e,prevId,currId){
  if(e.key==='Backspace'&&!document.getElementById(currId).value&&prevId){
    document.getElementById(prevId).focus();
  }
}

// ── UI HELPERS ──
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('loginForm').style.display=tab==='login'?'block':'none';
  document.getElementById('registerForm').style.display=tab==='register'?'block':'none';
  document.getElementById('forgotForm').style.display='none';
  hideMsg();
}
function showForgot(){
  document.getElementById('loginForm').style.display='none';
  document.getElementById('forgotForm').style.display='block';
  document.getElementById('newPassField').style.display='none';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  hideMsg();
}
function showLogin(){
  document.getElementById('loginForm').style.display='block';
  document.getElementById('forgotForm').style.display='none';
  document.getElementById('registerForm').style.display='none';
  document.getElementById('tabLogin').classList.add('active');
  document.getElementById('tabRegister').classList.remove('active');
  hideMsg();
}
function showMsg(text,type){const el=document.getElementById('msg');el.textContent=text;el.className='msg '+type;el.style.display='block';}
function hideMsg(){document.getElementById('msg').style.display='none';}
function showMsg2FA(text,type){const el=document.getElementById('tfaMsg');el.textContent=text;el.className='msg '+type;el.style.display='block';}
function setLang(l,btn){lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

if(localStorage.getItem('vc_token'))window.location.href='chat.html';
</script>
</body>
</html>
